name: Daily Oncology Paper Digest

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install anthropic feedparser

      - name: Run digest script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_summarize.py

      - name: Commit and push new paper data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Oncology Digest Bot"
          git add docs/papers/
          git diff --staged --quiet || git commit -m "digest: add paper $(date -u '+%Y-%m-%d')"
          git push
