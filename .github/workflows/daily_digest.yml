name: Daily Oncology Paper Digest

on:
  schedule:
    # Runs at 07:00 UTC every day (03:00 AM US Eastern)
    - cron: "0 7 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write  # Needed to commit JSON files and push to gh-pages

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install anthropic feedparser

      - name: Run digest script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/fetch_and_summarize.py

      - name: Commit and push new paper data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Oncology Digest Bot"
          git add docs/papers/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "digest: add paper $(date -u '+%Y-%m-%d')"
          git push
